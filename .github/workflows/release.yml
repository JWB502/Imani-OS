name: Release (Tauri)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version without v (e.g., 1.0 or 1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build & Publish (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-14
          - macos-13
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup tag and release names
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TAG_NAME=v${{ inputs.version }}" >> $GITHUB_ENV
            echo "RELEASE_NAME=Imani OS v${{ inputs.version }}" >> $GITHUB_ENV
            echo "RELEASE_BODY=Automated release for v${{ inputs.version }}." >> $GITHUB_ENV
          else
            echo "TAG_NAME=${GITHUB_REF_NAME}" >> $GITHUB_ENV
            echo "RELEASE_NAME=Imani OS ${GITHUB_REF_NAME}" >> $GITHUB_ENV
            echo "RELEASE_BODY=Automated release for ${GITHUB_REF_NAME}." >> $GITHUB_ENV
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build & Publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ env.TAG_NAME }}
          releaseName: ${{ env.RELEASE_NAME }}
          releaseBody: ${{ env.RELEASE_BODY }}
          prerelease: false
          includeUpdaterJson: true