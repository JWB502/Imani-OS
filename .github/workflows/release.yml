name: Release (Tauri)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number without the v"
        required: true
        default: "1.0.0"

permissions:
  contents: write

env:
  # Opt into Node 24 for JavaScript-based actions early (per GitHub deprecation notice).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: ""
          - platform: windows-latest
            args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build & Publish (binaries only)
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v${{ inputs.version }}
          releaseName: Imani OS v${{ inputs.version }}
          releaseBody: Automated release for v${{ inputs.version }}.
          prerelease: false
          includeUpdaterJson: false
          tauriScript: "npx tauri"
          args: ${{ matrix.args }}

      - name: Upload updater artifacts (for latest.json)
        uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ matrix.platform }}
          path: src-tauri/target/release/bundle/**

  publish-latest-json:
    name: Publish latest.json
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: .artifacts

      - name: Generate latest.json
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
          TAG_NAME: v${{ inputs.version }}
          REPO: ${{ github.repository }}
        run: |
          node ./scripts/generate-latest-json.mjs \
            --version "$VERSION" \
            --tag "$TAG_NAME" \
            --repo "$REPO" \
            --bundleDir ".artifacts" \
            --out "latest.json"

      - name: Upload latest.json to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: v${{ inputs.version }}
        run: |
          gh release upload "$TAG_NAME" latest.json --clobber