name: Release (Tauri)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number without the v"
        required: true
        default: "1.0.0"

permissions:
  contents: write

jobs:
  build:
    name: Build & Publish (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            args: ""
          - platform: macos-13
            args: ""
          - platform: windows-latest
            args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build & Publish
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v${{ inputs.version }}
          releaseName: Imani OS v${{ inputs.version }}
          releaseBody: Automated release for v${{ inputs.version }}.
          prerelease: false
          uploadUpdaterJson: ${{ matrix.platform == 'windows-latest' }}
          args: ${{ matrix.args }}