name: Release

on:
  push:
    tags:
      - 'v*' # Trigger on version tags (e.g. v1.3.2)
  workflow_dispatch:
    inputs:
      version:
        description: "Manually trigger version (without v)"
        required: false

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest] # Add macos-latest etc here later if needed

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Sync Version from Tag
        shell: bash
        run: |
          # Use the tag if triggered by tag, else use input, else fallback to current version
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION=${GITHUB_REF_NAME#v}
          elif [[ "${{ inputs.version }}" != "" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(jq -r .version src-tauri/tauri.conf.json)
          fi
          
          echo "Setting version to $VERSION"
          
          # Update tauri.conf.json (Source of Truth)
          jq ".version = \"$VERSION\"" src-tauri/tauri.conf.json > tauri.conf.tmp && mv tauri.conf.tmp src-tauri/tauri.conf.json
          
          # Update package.json
          jq ".version = \"$VERSION\"" package.json > package.tmp && mv package.tmp package.json
          
          # Save to Environment for subsequent steps
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build and Upload to GitHub Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v${{ env.VERSION }}
          releaseName: "Imani OS v${{ env.VERSION }}"
          releaseBody: "Automated release of Imani OS v${{ env.VERSION }}"
          releaseDraft: true
          prerelease: false
          tauriScript: npm run tauri

  publish-latest-json:
    name: Generate & Upload latest.json
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Version info
        id: version_info
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION=${GITHUB_REF_NAME#v}
          elif [[ "${{ inputs.version }}" != "" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(jq -r .version src-tauri/tauri.conf.json)
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Node
        uses: actions/setup-node@v4

      - name: Download release assets
        uses: robinraju/release-downloader@v1.10
        with:
          tag: ${{ steps.version_info.outputs.tag }}
          fileName: "*"
          out-file-path: "./release-assets"
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate latest.json
        run: |
          node ./scripts/generate-latest-json.mjs \
            --version "${{ steps.version_info.outputs.version }}" \
            --tag "${{ steps.version_info.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --bundleDir "./release-assets" \
            --out "latest.json"

      - name: Upload latest.json to Release
        uses: softprops/action-gh-release@v2
        with:
          files: latest.json
          tag_name: ${{ steps.version_info.outputs.tag }}
